<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PrimeTrade API Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body class="logged-out">
    
    <!-- Auth View (Only shown when logged out) -->
    <main class="auth-view">
      <div class="auth-card-container">
        <header class="auth-header">
          <p class="eyebrow">FastAPI + PostgreSQL + JWT</p>
          <h1>PrimeTrade</h1>
          <p class="lede">
            Sign in or register to manage tasks with complete security.
          </p>
        </header>

        <article class="panel auth-panel">
          <div class="tabs">
            <button id="showLogin" class="tab active" type="button">
              Log in
            </button>
            <button id="showRegister" class="tab" type="button">
              Register
            </button>
          </div>

          <form id="authForm" class="form">
            <label class="field">
              <span>Email</span>
              <input
                id="email"
                type="email"
                placeholder="admin@example.com"
                required
              />
            </label>
            <label class="field">
              <span>Full name</span>
              <input id="fullName" type="text" placeholder="Jane Doe" />
            </label>
            <label class="field">
              <span>Password</span>
              <input
                id="password"
                type="password"
                placeholder="••••••••"
                required
              />
            </label>
            <button class="primary" type="submit">Continue</button>
          </form>

          <div id="authMessage" class="message"></div>
        </article>
      </div>
    </main>

    <!-- Dashboard View (Only shown when logged in) -->
    <main class="dashboard-view shell">
      <!-- Dashboard Top Header Bar -->
      <header class="dashboard-header">
        <div class="brand">
          <h1>PrimeTrade</h1>
          <span class="badge badge-api">v1</span>
        </div>
        
        <div class="session-info">
          <div class="session-user">
            <h2 id="welcomeTitle">Loading...</h2>
            <div class="session-meta">
              <span id="roleBadge" class="role-badge">guest</span>
              <span id="tokenState" class="token-state muted">Authenticating...</span>
            </div>
          </div>
          <button id="logoutBtn" class="logout-btn" type="button">
            <svg class="logout-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
            Log out
          </button>
        </div>
      </header>

      <!-- Dashboard Grid Layout -->
      <section class="dashboard-grid">
        <!-- Sidebar: Task Creation Form -->
        <aside class="sidebar-column">
          <article class="panel">
            <div class="panel-header-simple">
              <h3>Create Task</h3>
            </div>
            <form id="taskForm" class="task-form">
              <label class="field">
                <span>Task title</span>
                <input
                  id="taskTitle"
                  type="text"
                  placeholder="Task title"
                  required
                />
              </label>
              
              <label class="field">
                <span>Short description</span>
                <textarea
                  id="taskDescription"
                  placeholder="Short description"
                  rows="3"
                ></textarea>
              </label>

              <label class="field">
                <span>Status</span>
                <select id="taskStatus">
                  <option value="pending">Pending</option>
                  <option value="in_progress">In progress</option>
                  <option value="completed">Completed</option>
                </select>
              </label>
              
              <button class="primary" type="submit">Add Task</button>
            </form>
          </article>
        </aside>

        <!-- Main Task List Panel -->
        <article class="panel main-column">
          <div class="panel-header-simple inline-head">
            <h3>Tasks</h3>
            <button id="refreshTasks" class="ghost-btn refresh-btn" type="button">
              <svg class="refresh-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/></svg>
              Refresh
            </button>
          </div>
          
          <div class="filters-row">
            <div class="search-box">
              <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
              <input
                id="searchInput"
                type="search"
                placeholder="Search tasks..."
              />
            </div>
            
            <div class="select-box">
              <select id="statusFilter">
                <option value="">All Statuses</option>
                <option value="pending">Pending</option>
                <option value="in_progress">In progress</option>
                <option value="completed">Completed</option>
              </select>
            </div>
          </div>

          <div id="tasksList" class="list"></div>
        </article>
      </section>

      <!-- Admin Panel Section -->
      <section id="adminSection" class="section-block admin-panel hidden">
        <article class="panel">
          <div class="panel-header-simple admin-head">
            <h3>Admin Users List</h3>
            <button id="loadUsersBtn" class="ghost-btn load-users-btn" type="button">
              Load users
            </button>
          </div>
          <div id="usersList" class="list admin-users-list"></div>
        </article>
      </section>
    </main>

    <script src="/static/app.js"></script>
    <div id="toast-root" aria-live="polite" aria-atomic="true"></div>
    <div id="modal-root"></div>
  </body>
</html>
